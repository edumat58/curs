name: Deploy Docusaurus

on:
  workflow_dispatch:  # Manual trigger (e.g. from mobile)
  push:
    branches:
      - main          # or 'master', depending on your branch

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # or your preferred Node version

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build

      # Push-urile făcute cu GITHUB_TOKEN nu declanșează automat buildul
      # Pages — îl pornim explicit, altfel site-ul rămâne pe versiunea veche.
      - name: Trigger Pages build
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
